name: 🚀 Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted

    steps:
      - name: Deploy
        run: |
          set -e
          cd /var/www/100t
          git checkout -- next-env.d.ts 2>/dev/null || true
          git pull origin main
          npm ci
          npx prisma generate
          npx prisma db push
          npm run build
          pm2 restart ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
          echo "✅ Déploiement terminé"

